version: "3.9"  # Compose file version

services:
  db:
    image: postgres:15  # PostgreSQL image
    container_name: postgres_db  # Container name

    restart: always  # Auto-restart container

    env_file:
      - .env  # Load environment variables

    ports:
      - "${POSTGRES_PORT}:5432"  # Map host:container port

    volumes:
      - postgres_data:/var/lib/postgresql/data  # Persist DB data
      - ./seed.sql:/docker-entrypoint-initdb.d/seed.sql  # Auto-run SQL on first start

volumes:
  postgres_data:  # Named volume for DB storage