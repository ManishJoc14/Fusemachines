version: "3.9"

services:

  db:
    image: postgres:15

    container_name: postgres_db

    restart: always

    env_file:
      - .db.env

    ports:
      - "${POSTGRES_PORT}:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./seed.sql:/docker-entrypoint-initdb.d/seed.sql

volumes:
  postgres_data: